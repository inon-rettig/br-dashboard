<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BR Studio — רשימת ספקים</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222535;
    --border: #2e3250;
    --accent: #4f7ef8;
    --accent2: #7c5cbf;
    --text: #e8eaf6;
    --text2: #9098c0;
    --green: #4caf82;
    --yellow: #f5c542;
    --red: #e05c5c;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Arial, sans-serif; min-height: 100vh; }

  /* HEADER */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 20px 32px; display: flex; align-items: center; gap: 16px; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 1px; white-space: nowrap; }
  .logo span { color: var(--text2); font-weight: 400; font-size: 14px; margin-right: 8px; }
  .search-wrap { flex: 1; position: relative; max-width: 600px; }
  #search { width: 100%; padding: 10px 44px 10px 16px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface2); color: var(--text); font-size: 15px; outline: none; transition: border 0.2s; }
  #search:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 16px; pointer-events: none; }
  .header-actions { display: flex; gap: 10px; margin-right: auto; }
  .btn { padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3d6ae0; }
  .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
  .btn-outline:hover { background: rgba(79,126,248,0.1); }

  /* FILTERS */
  .filters { padding: 14px 32px; display: flex; gap: 8px; flex-wrap: wrap; background: var(--surface); border-bottom: 1px solid var(--border); }
  .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  /* MAIN LAYOUT */
  .main { display: grid; grid-template-columns: 1fr 340px; gap: 0; min-height: calc(100vh - 120px); }
  .vendors-panel { padding: 24px 32px; overflow-y: auto; }
  .google-panel { background: var(--surface); border-right: 1px solid var(--border); padding: 24px 20px; position: sticky; top: 61px; height: calc(100vh - 61px); overflow-y: auto; }

  /* STATS */
  .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; flex: 1; min-width: 100px; }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
  .stat-label { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* VENDOR CARDS */
  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin: 20px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .section-title:first-of-type { margin-top: 0; }
  .vendor-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; position: relative; }
  .vendor-card:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(79,126,248,0.12); }
  .vendor-card.expanded { border-color: var(--accent); background: var(--surface2); }
  .vendor-header { display: flex; align-items: center; gap: 12px; }
  .vendor-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; color: #fff; flex-shrink: 0; }
  .vendor-main { flex: 1; min-width: 0; }
  .vendor-name { font-size: 16px; font-weight: 700; color: var(--text); }
  .vendor-desc { font-size: 13px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vendor-meta { display: flex; gap: 8px; align-items: center; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: rgba(79,126,248,0.15); color: var(--accent); font-weight: 600; }
  .tag.il { background: rgba(76,175,130,0.15); color: var(--green); }
  .tag.cn { background: rgba(245,197,66,0.15); color: var(--yellow); }
  .expand-icon { color: var(--text2); font-size: 18px; transition: transform 0.2s; }
  .vendor-card.expanded .expand-icon { transform: rotate(180deg); }

  /* EXPANDED DETAILS */
  .vendor-details { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .vendor-card.expanded .vendor-details { display: block; }
  .contacts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; margin-bottom: 10px; }
  .contact-item { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
  .contact-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .contact-line { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 6px; margin-top: 3px; }
  .contact-line a { color: var(--accent); text-decoration: none; }
  .contact-line a:hover { text-decoration: underline; }
  .detail-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .action-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text2); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* GOOGLE PANEL */
  .google-panel h3 { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .google-query { font-size: 12px; color: var(--text2); margin-bottom: 16px; padding: 6px 10px; background: var(--surface2); border-radius: 6px; border: 1px solid var(--border); }
  .google-query span { color: var(--accent); }
  .google-results { display: flex; flex-direction: column; gap: 10px; }
  .google-result { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.15s; text-decoration: none; display: block; }
  .google-result:hover { border-color: var(--accent); }
  .gr-title { font-size: 13px; font-weight: 600; color: #7bbfff; margin-bottom: 3px; }
  .gr-url { font-size: 11px; color: var(--green); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gr-snippet { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .google-loading { text-align: center; padding: 30px; color: var(--text2); }
  .google-search-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; margin-top: 12px; transition: all 0.15s; }
  .google-search-btn:hover { border-color: var(--accent); color: var(--accent); }
  .google-hint { font-size: 12px; color: var(--text2); text-align: center; padding: 20px; }
  .google-hint .icon { font-size: 32px; margin-bottom: 8px; }

  /* ADD VENDOR MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 20px; margin-bottom: 20px; color: var(--text); }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 5px; font-weight: 600; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; outline: none; transition: border 0.2s; font-family: inherit; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel { background: transparent; color: var(--text2); border: 1.5px solid var(--border); }
  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }

  /* NO RESULTS */
  .no-results { text-align: center; padding: 60px 20px; color: var(--text2); }
  .no-results .icon { font-size: 48px; margin-bottom: 12px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; }
    .google-panel { position: relative; height: auto; border-right: none; border-top: 1px solid var(--border); }
    header { flex-wrap: wrap; padding: 14px 16px; gap: 10px; }
    .vendors-panel { padding: 16px; }
  }
</style>
</head>

<header>

  <div class="search-wrap">

</div>

function initFilters() {
  const cats = [...new Set(vendors.map(v => v.category))];
  const container = document.getElementById('filters');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.onclick = () => setFilter(cat, btn);
    container.appendChild(btn);
  });
  // populate modal select
  const sel = document.getElementById('f-cat');
  ['ייצור מודלים / אב-טיפוס','הדפסה תלת-מימד (3D)','דפוס / הדפסה 2D','CNC / לייזר / מתכת',
   'פלסטיק / הזרקה / עיבוד','שילוח / לוגיסטיקה','ספק PCB / אלקטרוניקה','ייעוץ / הנדסה חיצוני',
   'ציוד / חומרים / ריהוט','ספקים אחרים'].forEach(c => {
    const o = document.createElement('option');
    o.value = o.textContent = c;
    sel.appendChild(o);
  });
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

document.getElementById('search').addEventListener('input', e => {
  activeSearch = e.target.value.toLowerCase().trim();
  applyFilters();
});

function applyFilters() {
  filtered = vendors.filter(v => {
    const catOk = activeFilter === 'all' || v.category === activeFilter;
    if (!activeSearch) return catOk;
    const haystack = [v.biz_name, v.description, v.category, v.domain,
      ...v.contacts.map(c => c.name + ' ' + c.email)].join(' ').toLowerCase();
    return catOk && haystack.includes(activeSearch);
  });
  render();
}

function render() {
  const list = document.getElementById('vendors-list');
  const statsEl = document.getElementById('stats');

  // stats
  const cats = [...new Set(filtered.map(v => v.category))];
  statsEl.innerHTML = `
    <div class="stat-card"><div class="stat-num">${filtered.length}</div><div class="stat-label">ספקים</div></div>
    <div class="stat-card"><div class="stat-num">${cats.length}</div><div class="stat-label">קטגוריות</div></div>
  `;

  if (!filtered.length) {
    list.innerHTML = '<div class="no-results"><div class="icon">🔍</div><p>לא נמצאו ספקים</p></div>';
    return;
  }

  // group by category
  const grouped = {};
  filtered.forEach(v => {
    if (!grouped[v.category]) grouped[v.category] = [];
    grouped[v.category].push(v);
  });

  let html = '';
  const catOrder = ['ייצור מודלים / אב-טיפוס','הדפסה תלת-מימד (3D)','דפוס / הדפסה 2D',
    'CNC / לייזר / מתכת','פלסטיק / הזרקה / עיבוד','שילוח / לוגיסטיקה',
    'ספק PCB / אלקטרוניקה','ייעוץ / הנדסה חיצוני','ציוד / חומרים / ריהוט','ספקים אחרים'];

  catOrder.forEach(cat => {
    if (!grouped[cat]) return;
    html += `<div class="section-title">${cat} (${grouped[cat].length})</div>`;
    grouped[cat].forEach((v, i) => {
      html += renderCard(v);
    });
  });

  list.innerHTML = html;
}

function renderCard(v) {
  const color = CAT_COLORS[v.category] || '#7a8aaa';
  const initials = v.biz_name.substring(0, 2).toUpperCase();
  const isIsrael = v.domain.endsWith('.co.il') || v.domain.endsWith('.org.il');
  const isChina = v.domain.endsWith('.cn') || ['mastars','junhuamodel','rtprototype','rjxhobby','xinmotechnology'].some(k => v.domain.includes(k));
  const countryTag = isIsrael ? '<span class="tag il">🇮🇱 ישראל</span>' : isChina ? '<span class="tag cn">🇨🇳 סין</span>' : '';

  const contactsHtml = v.contacts.map(c => `
    <div class="contact-item">
      <div class="contact-name">${c.name || c.email.split('@')[0]}</div>
      ${c.phone ? `<div class="contact-line">📞 <a href="tel:${c.phone}">${c.phone}</a></div>` : ''}
      <div class="contact-line">✉️ <a href="mailto:${c.email}">${c.email}</a></div>
    </div>
  `).join('');

  const searchQuery = encodeURIComponent(v.biz_name + ' ' + v.description);
  const googleUrl = `https://www.google.com/search?q=${searchQuery}`;

  return `
    <div class="vendor-card" onclick="toggleCard(this, '${v.biz_name.replace(/'/g,"\'")}')" data-query="${v.biz_name} ${v.description}">
      <div class="vendor-header">
        <div class="vendor-avatar" style="background:${color}">${initials}</div>
        <div class="vendor-main">
          <div class="vendor-name">${v.biz_name}</div>
          <div class="vendor-desc">${v.description}</div>
        </div>
        <div class="vendor-meta">
          ${countryTag}
          <span class="tag">${v.contacts.length} אנשי קשר</span>
        </div>
        <span class="expand-icon">⌄</span>
      </div>
      <div class="vendor-details">
        <div class="contacts-grid">${contactsHtml}</div>
        <div class="detail-actions">
          <a class="action-btn" href="${googleUrl}" target="_blank">🔍 חפש בגוגל</a>
          <a class="action-btn" href="https://${v.domain}" target="_blank">🌐 אתר</a>
          ${v.contacts[0]?.email ? `<a class="action-btn" href="mailto:${v.contacts[0].email}">✉️ שלח מייל</a>` : ''}
        </div>
      </div>
    </div>
  `;
}

function toggleCard(el, bizName) {
  const wasExpanded = el.classList.contains('expanded');
  document.querySelectorAll('.vendor-card.expanded').forEach(c => c.classList.remove('expanded'));
  if (!wasExpanded) {
    el.classList.add('expanded');
    // trigger google search for similar vendors
    const query = el.dataset.query;
    searchGoogle(query, bizName);
  }
}

// ===== GOOGLE SEARCH PANEL =====
function searchGoogle(query, bizName) {
  const resultsEl = document.getElementById('google-results');
  const queryEl = document.getElementById('google-query');
  queryEl.innerHTML = `חיפוש: <span>${bizName}</span>`;
  resultsEl.innerHTML = '<div class="google-loading">⏳ מחפש...</div>';

  // Use Google Custom Search API or fallback to links
  const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query + ' ספק ישראל OR supplier')}`;

  // Build suggested search links (since direct Google API needs key)
  const searches = [
    { label: bizName + ' — אתר רשמי', q: bizName + ' official site' },
    { label: 'ספקים דומים — ' + query.split(' ').slice(0,3).join(' '), q: query + ' suppliers alternatives' },
    { label: query + ' ישראל', q: query + ' Israel ספקים' },
    { label: query + ' reviews', q: query + ' reviews rating' },
    { label: query + ' B2B', q: query + ' B2B manufacturer' },
  ];

  resultsEl.innerHTML = searches.map(s => `
    <a class="google-result" href="https://www.google.com/search?q=${encodeURIComponent(s.q)}" target="_blank">
      <div class="gr-title">${s.label}</div>
      <div class="gr-url">google.com/search?q=${encodeURIComponent(s.q).substring(0,40)}...</div>
      <div class="gr-snippet">לחץ לחיפוש בגוגל ↗</div>
    </a>
  `).join('') + `
    <button class="google-search-btn" onclick="window.open('${searchUrl}','_blank')">
      🔍 פתח חיפוש מלא בגוגל
    </button>
  `;
}

// ===== ADD VENDOR =====
function openAddModal() { document.getElementById('modal').classList.add('show'); }
function closeModal() { document.getElementById('modal').classList.remove('show'); }

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

function addVendor() {
  const biz = document.getElementById('f-biz').value.trim();
  const cat = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value.trim();
  const domain = document.getElementById('f-domain').value.trim().replace(/^https?:\/\//, '').replace(/^www\./, '');
  const cname = document.getElementById('f-cname').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const notes = document.getElementById('f-notes').value.trim();

  if (!biz || !cat) { alert('שם עסק וקטגוריה הם שדות חובה'); return; }

  const newVendor = {
    category: cat,
    biz_name: biz,
    description: desc,
    domain: domain || (email ? email.split('@')[1] : ''),
    website: domain ? 'https://' + domain : '',
    contacts: [{ name: cname, email: email, phone: phone }],
    msgs: 0,
    notes: notes,
    added_manually: true,
  };

  vendors.unshift(newVendor);
  localStorage.setItem('br_vendors', JSON.stringify(vendors));
  closeModal();
  applyFilters();
  alert('✅ ספק נוסף בהצלחה! (נשמר בדפדפן)');

  // clear form
  ['f-biz','f-desc','f-domain','f-country','f-cname','f-phone','f-email','f-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

// ===== LOAD SAVED VENDORS FROM LOCALSTORAGE =====
function loadSaved() {
  const saved = localStorage.getItem('br_vendors');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (parsed.length > vendors.length) {
        vendors = parsed;
      }
    } catch(e) {}
  }
}

// ===== INIT =====
loadSaved();
initFilters();
applyFilters();
</script>
